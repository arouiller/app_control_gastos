name: Sincronizar Especificaciones

on:
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled]
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas
  workflow_dispatch:  # Manual trigger

jobs:
  sync-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Generar ESPECIFICACIONES.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Obtener todos los issues con label 'spec'
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'spec',
              state: 'all',
              per_page: 100
            });

            // Agrupar por estado
            const abiertos = issues.filter(i => i.state === 'open');
            const completados = issues.filter(i => i.state === 'closed');

            // Generar markdown
            let content = `# Especificaciones - App Control Gastos

**Última actualización:** ${new Date().toLocaleString('es-ES')}

## En Desarrollo (${abiertos.length})

`;

            abiertos.forEach(issue => {
              content += `- [ ] **#${issue.number}** - ${issue.title}\n`;
              if (issue.body) {
                content += `  > ${issue.body.split('\n')[0]}\n`;
              }
            });

            content += `\n## Completadas (${completados.length})\n\n`;

            completados.forEach(issue => {
              content += `- [x] **#${issue.number}** - ${issue.title}\n`;
            });

            content += `\n---\n\n## Instrucciones

1. **Agregar nueva especificación:** Crear issue con label \`spec\`
2. **Marcar como completada:** Cerrar el issue
3. **Este documento se actualiza automáticamente**

`;

            // Escribir archivo
            fs.writeFileSync('ESPECIFICACIONES.md', content);
            console.log('✅ ESPECIFICACIONES.md actualizado');

      - name: Commit y push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ESPECIFICACIONES.md
          git commit -m "docs: actualizar especificaciones [skip ci]" || echo "Sin cambios"
          git push
